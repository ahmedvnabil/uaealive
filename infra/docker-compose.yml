name: uaealive

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: uae
      POSTGRES_PASSWORD: uae
      POSTGRES_DB: uaealive
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uae -d uaealive"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://uae:uae@db:5432/uaealive
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      AI_MODEL_CHAT: ${AI_MODEL_CHAT:-claude-account-haiku-4-5}
      AI_MODEL_COPILOT: ${AI_MODEL_COPILOT:-claude-account-sonnet-4-6}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      DATA_DIR: /srv/data
    volumes:
      - ../data:/srv/data:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle — must be the browser-visible origin.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      # Server-side rendering reaches the API over the internal Docker network
      # (localhost:8080 inside this container would point at the web app itself).
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
