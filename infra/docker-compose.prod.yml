# Production compose — uaelive.zad.tools
# الفرق عن نسخة التطوير: لا بورتات مكشوفة للهوست إلا nginx على 127.0.0.1:8080
# (CloudPanel يقف أمامه بـ SSL)، و restart policies لكل الخدمات.
name: uaealive

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: uae
      POSTGRES_PASSWORD: uae   # الشبكة داخلية فقط — غير مكشوفة للهوست
      POSTGRES_DB: uaealive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uae -d uaealive"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://uae:uae@db:5432/uaealive
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      AI_MODEL_CHAT: ${AI_MODEL_CHAT:-claude-account-haiku-4-5}
      AI_MODEL_COPILOT: ${AI_MODEL_COPILOT:-claude-account-sonnet-4-6}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://uaelive.zad.tools}
      DATA_DIR: /srv/data
    volumes:
      - ../data:/srv/data:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # تُخبز في حزمة المتصفح — يجب أن تكون هي الأصل المرئي للزائر
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://uaelive.zad.tools}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://uaelive.zad.tools}
    restart: unless-stopped
    environment:
      # الـ SSR يصل للـ API عبر شبكة الحاويات الداخلية
      API_INTERNAL_URL: http://api:8000
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
