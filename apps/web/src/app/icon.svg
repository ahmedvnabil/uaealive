<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UAE ALIVE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131826"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6C15A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="384" cy="150" r="46" fill="white"/>
      <circle cx="404" cy="140" r="40" fill="black"/>
    </mask>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- crescent (top-right) -->
  <rect width="512" height="512" fill="url(#gold)" mask="url(#crescent)" opacity="0.95"/>
  <!-- stars -->
  <circle cx="132" cy="132" r="4" fill="#E8DCC8" opacity="0.7"/>
  <circle cx="110" cy="196" r="3" fill="#E8DCC8" opacity="0.5"/>
  <circle cx="150" cy="96" r="3" fill="#E8DCC8" opacity="0.6"/>
  <g fill="url(#gold)">
    <!-- crenellated crown (merlons) -->
    <rect x="158" y="122" width="26" height="34"/>
    <rect x="204" y="122" width="26" height="34"/>
    <rect x="250" y="122" width="26" height="34"/>
    <rect x="296" y="122" width="26" height="34"/>
    <!-- lintel over the fins -->
    <rect x="150" y="156" width="180" height="26"/>
    <!-- tower body -->
    <rect x="166" y="182" width="148" height="214"/>
    <!-- base -->
    <rect x="140" y="396" width="200" height="18"/>
    <rect x="128" y="414" width="224" height="16"/>
  </g>
  <!-- four wind-catcher fins (night slots) -->
  <g fill="#0B0E14">
    <rect x="182" y="206" width="18" height="168" rx="3"/>
    <rect x="214" y="206" width="18" height="168" rx="3"/>
    <rect x="246" y="206" width="18" height="168" rx="3"/>
    <rect x="278" y="206" width="18" height="168" rx="3"/>
  </g>
</svg>
