<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="cmSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <radialGradient id="cmEmber" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#E6C15A" stop-opacity=".55"/>
      <stop offset="1" stop-color="#E6C15A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cmCoral" width="16" height="12" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.1" fill="#0B0E14" opacity=".1"/>
      <circle cx="12" cy="9" r="0.9" fill="#0B0E14" opacity=".08"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#cmSky)"/>
  <g fill="#E8DCC8">
    <circle cx="90" cy="70" r="2" opacity=".8"/><circle cx="210" cy="40" r="1.3" opacity=".55"/>
    <circle cx="330" cy="90" r="1.6" opacity=".7"/><circle cx="700" cy="60" r="1.9" opacity=".8"/>
    <circle cx="620" cy="120" r="1.2" opacity=".5"/><circle cx="750" cy="150" r="1.4" opacity=".6"/>
  </g>
  <!-- courtyard wall with arch -->
  <rect x="60" y="150" width="680" height="290" fill="#E8DCC8"/>
  <rect x="60" y="150" width="680" height="290" fill="url(#cmCoral)"/>
  <path d="M300,440 v-160 a100,110 0 0 1 200,0 v160 z" fill="#131826"/>
  <path d="M300,440 v-160 a100,110 0 0 1 200,0 v160 z" fill="none" stroke="#C9A227" stroke-width="5"/>
  <!-- lattice screens flanking the arch -->
  <g stroke="#0B0E14" stroke-width="2" opacity=".25">
    <path d="M140,210 h80 M140,240 h80 M140,270 h80 M140,300 h80 M140,330 h80 M160,200 v140 M180,200 v140 M200,200 v140"/>
    <path d="M580,210 h80 M580,240 h80 M580,270 h80 M580,300 h80 M580,330 h80 M600,200 v140 M620,200 v140 M640,200 v140"/>
  </g>
  <rect x="140" y="200" width="80" height="140" fill="none" stroke="#B0603E" stroke-width="4"/>
  <rect x="580" y="200" width="80" height="140" fill="none" stroke="#B0603E" stroke-width="4"/>
  <!-- ground -->
  <rect y="440" width="800" height="60" fill="#0E1220"/>
  <!-- brazier glow -->
  <ellipse cx="400" cy="415" rx="190" ry="90" fill="url(#cmEmber)"/>
  <!-- brazier with coals -->
  <path d="M340,428 h120 l-14,-26 h-92 z" fill="#1B2233"/>
  <g fill="#B0603E"><circle cx="378" cy="400" r="7"/><circle cx="400" cy="396" r="8"/><circle cx="422" cy="401" r="6.5"/></g>
  <g fill="#E6C15A"><circle cx="390" cy="398" r="3.4"/><circle cx="412" cy="399" r="3"/></g>
  <!-- dallah coffee pot -->
  <g fill="#C9A227">
    <path d="M372,388 c-4,-34 6,-52 2,-74 c-3,-16 -2,-26 8,-34 h36 c10,8 11,18 8,34 c-4,22 6,40 2,74 z"/>
    <path d="M382,280 l18,-16 l18,16 z"/>
    <path d="M400,258 l10,8 h-20 z"/>
    <circle cx="400" cy="254" r="5" fill="#E6C15A"/>
    <path d="M368,300 c-22,4 -30,22 -24,40 l10,-4 c-4,-12 2,-24 16,-28 z"/>
    <path d="M432,296 c18,-10 22,-28 12,-40 l-8,26 z"/>
  </g>
  <path d="M386,282 h28" stroke="#E6C15A" stroke-width="4"/>
  <!-- steam -->
  <g stroke="#E8DCC8" stroke-width="3" fill="none" opacity=".5" stroke-linecap="round">
    <path d="M390,240 c-8,-14 8,-22 0,-38"/>
    <path d="M412,236 c8,-16 -8,-24 0,-40"/>
  </g>
  <!-- coffee cups on the ground -->
  <g fill="#E8DCC8">
    <path d="M492,428 a12,12 0 0 0 24,0 v-12 h-24 z"/>
    <path d="M292,428 a11,11 0 0 0 22,0 v-11 h-22 z"/>
  </g>
  <path d="M494,416 h20 M294,417 h18" stroke="#C9A227" stroke-width="2.4"/>
</svg>
