    <rect x="170" y="240" width="52" height="64" fill="#131826"/>
    <circle cx="196" cy="272" r="16" fill="#2E6E5E"/>
    <rect x="170" y="240" width="52" height="64" fill="none" stroke="#C9A227" stroke-width="3.4"/>
    <rect x="600" y="290" width="70" height="54" fill="#131826"/>
    <path d="M606,336 q18,-30 32,-8 q14,-22 26,-4 v10 h-58 z" fill="#E6C15A"/>
