<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="mgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="mgCoral" width="18" height="14" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#0B0E14" opacity=".08"/>
      <circle cx="14" cy="11" r="0.8" fill="#0B0E14" opacity=".06"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#mgSky)"/>
  <g fill="#E8DCC8">
    <circle cx="90" cy="50" r="1.8" opacity=".75"/><circle cx="700" cy="40" r="1.6" opacity=".65"/>
    <circle cx="560" cy="80" r="1.2" opacity=".5"/>
  </g>
  <!-- wind tower rising behind courtyard -->
  <g fill="#D8C9AC">
    <rect x="600" y="70" width="110" height="180"/>
    <rect x="590" y="64" width="16" height="22"/><rect x="704" y="64" width="16" height="22"/>
    <rect x="648" y="46" width="14" height="26"/>
