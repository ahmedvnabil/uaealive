<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="wtSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="wtCoral" width="16" height="12" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.1" fill="#0B0E14" opacity=".1"/>
      <circle cx="12" cy="9" r="0.9" fill="#0B0E14" opacity=".08"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#wtSky)"/>
  <g fill="#E8DCC8">
    <circle cx="100" cy="80" r="2" opacity=".8"/><circle cx="200" cy="150" r="1.3" opacity=".55"/>
    <circle cx="640" cy="70" r="1.7" opacity=".7"/><circle cx="720" cy="180" r="1.3" opacity=".55"/>
    <circle cx="560" cy="200" r="1.2" opacity=".5"/><circle cx="150" cy="260" r="1.2" opacity=".45"/>
  </g>
  <path d="M660,90 a44,44 0 1 0 30,76 a35,35 0 1 1 -30,-76 z" fill="#E6C15A" opacity=".9"/>
  <!-- monumental barjeel, seen close from below -->
  <!-- tower body with perspective taper -->
  <path d="M280,470 L310,120 H490 L520,470 Z" fill="#E8DCC8"/>
  <path d="M280,470 L310,120 H490 L520,470 Z" fill="url(#wtCoral)"/>
  <!-- shaded left face -->
  <path d="M280,470 L310,120 H340 L318,470 Z" fill="#D8C9AC"/>
  <!-- stepped parapet -->
  <g fill="#E8DCC8">
    <rect x="292" y="96" width="26" height="30"/>
    <rect x="482" y="96" width="26" height="30"/>
    <rect x="288" y="78" width="20" height="22"/>
    <rect x="492" y="78" width="20" height="22"/>
    <rect x="390" y="66" width="20" height="56"/>
  </g>
  <!-- four tall opening slots with X partition visible -->
  <g>
    <g fill="#131826">
      <path d="M330,150 h28 l-6,150 h-26 z"/>
      <path d="M370,150 h28 l-3,150 h-27 z"/>
      <path d="M410,150 h28 l3,150 h-27 z"/>
      <path d="M450,150 h28 l6,150 h-26 z"/>
    </g>
    <g stroke="#E8DCC8" stroke-width="5">
      <path d="M330,225 h150"/>
    </g>
    <g stroke="#C9A227" stroke-width="3.6" opacity=".9">
      <path d="M332,152 l22,146 M358,152 l-24,146"/>
      <path d="M372,152 l22,146 M398,152 l-24,146"/>
      <path d="M412,152 l22,146 M438,152 l-24,146"/>
      <path d="M452,152 l22,146 M478,152 l-24,146"/>
    </g>
  </g>
  <!-- carved band under openings -->
  <path d="M322,318 h158" stroke="#B0603E" stroke-width="6"/>
  <g fill="none" stroke="#0B0E14" stroke-width="2.4" opacity=".3">
    <circle cx="352" cy="352" r="14"/><circle cx="400" cy="352" r="14"/><circle cx="448" cy="352" r="14"/>
  </g>
  <!-- breeze lines drawn down into the house -->
  <g stroke="#E6C15A" stroke-width="4" fill="none" stroke-linecap="round" opacity=".85">
    <path d="M240,140 c40,10 60,40 64,80"/>
    <path d="M212,190 c44,14 58,44 60,78"/>
    <path d="M574,150 c-42,10 -60,42 -62,80"/>
  </g>
  <!-- flanking rooftops of the merchant house -->
  <rect x="40" y="380" width="240" height="90" fill="#D8C9AC"/>
  <rect x="520" y="360" width="240" height="110" fill="#D8C9AC"/>
  <g fill="#B98F63" opacity=".55">
    <rect x="60" y="390" width="14" height="10"/><rect x="96" y="390" width="14" height="10"/>
    <rect x="132" y="390" width="14" height="10"/><rect x="168" y="390" width="14" height="10"/>
    <rect x="204" y="390" width="14" height="10"/><rect x="240" y="390" width="14" height="10"/>
    <rect x="545" y="372" width="14" height="10"/><rect x="581" y="372" width="14" height="10"/>
    <rect x="617" y="372" width="14" height="10"/><rect x="653" y="372" width="14" height="10"/>
    <rect x="689" y="372" width="14" height="10"/><rect x="725" y="372" width="14" height="10"/>
  </g>
  <!-- teak door at tower base -->
  <path d="M368,470 v-52 a32,30 0 0 1 64,0 v52 z" fill="#B0603E"/>
  <g fill="#E6C15A">
    <circle cx="386" cy="436" r="2.6"/><circle cx="400" cy="432" r="2.6"/><circle cx="414" cy="436" r="2.6"/>
    <circle cx="386" cy="452" r="2.6"/><circle cx="400" cy="452" r="2.6"/><circle cx="414" cy="452" r="2.6"/>
  </g>
  <rect y="470" width="800" height="30" fill="#0E1220"/>
</svg>
