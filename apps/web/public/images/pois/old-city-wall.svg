<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="owSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="owCoral" width="14" height="10" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#0B0E14" opacity=".14"/>
      <circle cx="10" cy="7" r="1" fill="#0B0E14" opacity=".1"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#owSky)"/>
  <!-- big open sky with many stars -->
  <g fill="#E8DCC8">
    <circle cx="70" cy="50" r="2" opacity=".85"/><circle cx="160" cy="110" r="1.3" opacity=".6"/>
    <circle cx="250" cy="60" r="1.7" opacity=".75"/><circle cx="330" cy="140" r="1.2" opacity=".5"/>
    <circle cx="420" cy="50" r="1.9" opacity=".8"/><circle cx="500" cy="120" r="1.3" opacity=".55"/>
    <circle cx="590" cy="70" r="1.6" opacity=".7"/><circle cx="680" cy="130" r="1.3" opacity=".55"/>
    <circle cx="750" cy="60" r="1.8" opacity=".75"/><circle cx="110" cy="200" r="1.2" opacity=".45"/>
    <circle cx="360" cy="210" r="1.3" opacity=".5"/><circle cx="640" cy="200" r="1.2" opacity=".45"/>
    <circle cx="220" cy="250" r="1.1" opacity=".4"/><circle cx="540" cy="250" r="1.1" opacity=".4"/>
  </g>
  <path d="M700,80 a40,40 0 1 0 28,68 a32,32 0 1 1 -28,-68 z" fill="#E6C15A" opacity=".9"/>
  <!-- faint distant wind towers, the town that outgrew the wall -->
  <g fill="#1B2233">
    <path d="M60,330 h56 v-60 h10 v-8 h6 v8 h10 v60 h60 v-40 h50 v40 h44 v-70 h10 v-8 h6 v8 h10 v70 h80 v-46 h56 v46 h60 v-64 h10 v-8 h6 v8 h10 v64 h90 v-38 h60 v38 h56 v30 h-690 z"/>
  </g>
  <!-- ruined wall fragment, foreground hero -->
  <g>
    <path d="M90,470 v-90 l30,-14 l24,20 l38,-24 l30,18 l44,-10 l20,14 l52,-20 l30,16 l48,-8 l26,12 l58,-16 l34,18 l60,-8 v92 z" fill="#E8DCC8"/>
    <path d="M90,470 v-90 l30,-14 l24,20 l38,-24 l30,18 l44,-10 l20,14 l52,-20 l30,16 l48,-8 l26,12 l58,-16 l34,18 l60,-8 v92 z" fill="url(#owCoral)"/>
    <!-- coral block joints -->
    <g stroke="#0B0E14" stroke-width="2.6" opacity=".3" fill="none">
      <path d="M96,414 h480 M120,442 h460"/>
      <path d="M160,382 v88 M240,388 v82 M320,380 v90 M400,384 v86 M472,378 v92 M540,384 v86"/>
      <path d="M198,414 v28 M282,414 v28 M364,414 v28 M436,414 v28 M508,414 v28"/>
    </g>
    <!-- crumbled edge stones -->
    <g fill="#D8C9AC">
      <path d="M148,366 l22,18 l-30,6 z"/>
      <path d="M338,352 l24,14 l-30,8 z"/>
      <path d="M520,354 l22,14 l-28,8 z"/>
    </g>
  </g>
  <!-- fallen stones on the sand -->
  <g fill="#D8C9AC">
    <path d="M636,462 l16,-14 l20,10 l-6,14 h-26 z"/>
    <path d="M690,468 l12,-10 l16,8 l-4,10 h-22 z"/>
    <path d="M60,464 l14,-12 l18,8 l-4,12 h-24 z"/>
  </g>
  <!-- interpretive plaque on a post -->
  <g>
    <rect x="702" y="380" width="8" height="90" fill="#B0603E"/>
    <rect x="676" y="346" width="76" height="48" rx="4" fill="#131826" stroke="#C9A227" stroke-width="3"/>
    <g stroke="#C9A227" stroke-width="3" opacity=".8">
      <line x1="688" y1="360" x2="740" y2="360"/>
      <line x1="688" y1="370" x2="732" y2="370"/>
      <line x1="688" y1="380" x2="738" y2="380"/>
    </g>
  </g>
  <!-- desert ground -->
  <rect y="470" width="800" height="30" fill="#0E1220"/>
  <path d="M0,470 q100,-8 200,0 t200,0 t200,0 t200,0 v30 h-800 z" fill="#171d2c"/>
  <!-- tuft of desert grass -->
  <g stroke="#2E6E5E" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M600,470 c-4,-16 -12,-24 -20,-28"/>
    <path d="M600,470 c0,-18 -2,-28 2,-36"/>
    <path d="M600,470 c6,-14 14,-20 22,-24"/>
  </g>
</svg>
