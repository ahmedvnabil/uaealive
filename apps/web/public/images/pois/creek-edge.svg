<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="ceSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset=".7" stop-color="#131826"/>
      <stop offset="1" stop-color="#1E2438"/>
    </linearGradient>
    <linearGradient id="ceWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2133"/><stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="ceDusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A227" stop-opacity="0"/>
      <stop offset="1" stop-color="#B0603E" stop-opacity=".3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ceSky)"/>
  <rect y="120" width="800" height="160" fill="url(#ceDusk)"/>
  <g fill="#E8DCC8">
    <circle cx="90" cy="60" r="2" opacity=".85"/><circle cx="220" cy="100" r="1.3" opacity=".55"/>
    <circle cx="360" cy="50" r="1.7" opacity=".75"/><circle cx="520" cy="90" r="1.2" opacity=".5"/>
    <circle cx="650" cy="50" r="1.9" opacity=".8"/><circle cx="740" cy="110" r="1.3" opacity=".55"/>
  </g>
  <!-- Deira skyline across the water, lit at dusk -->
  <g fill="#1C2334">
    <path d="M0,280 h70 v-46 h44 v46 h40 v-70 h8 v-8 h6 v8 h8 v70 h70 v-38 h54 v38 h50 v-58 h8 v-8 h6 v8 h8 v58 h80 v-44 h56 v44 h60 v-66 h8 v-8 h6 v8 h8 v66 h64 v-36 h56 v36 h80 v280 h-800 z"/>
  </g>
  <g fill="#E6C15A" opacity=".7">
    <rect x="86" y="246" width="8" height="10"/><rect x="146" y="222" width="8" height="10"/>
    <rect x="260" y="252" width="8" height="10"/><rect x="330" y="234" width="8" height="10"/>
    <rect x="446" y="246" width="8" height="10"/><rect x="530" y="226" width="8" height="10"/>
    <rect x="616" y="254" width="8" height="10"/><rect x="700" y="256" width="8" height="10"/>
  </g>
  <!-- creek water -->
  <rect y="280" width="800" height="160" fill="url(#ceWater)"/>
  <!-- brass-coloured reflections -->
  <g stroke="#C9A227" stroke-linecap="round" opacity=".55">
    <line x1="80" y1="300" x2="150" y2="300" stroke-width="3"/>
    <line x1="120" y1="330" x2="230" y2="330" stroke-width="2.4"/>
    <line x1="300" y1="312" x2="400" y2="312" stroke-width="3"/>
    <line x1="360" y1="352" x2="470" y2="352" stroke-width="2.4"/>
    <line x1="540" y1="306" x2="640" y2="306" stroke-width="3"/>
    <line x1="600" y1="344" x2="700" y2="344" stroke-width="2.4"/>
    <line x1="200" y1="386" x2="330" y2="386" stroke-width="2"/>
    <line x1="480" y1="396" x2="600" y2="396" stroke-width="2"/>
  </g>
  <!-- abra crossing mid-water -->
  <g>
    <path d="M300,352 q60,26 160,0 l-18,20 h-124 z" fill="#131826"/>
    <rect x="336" y="318" width="88" height="14" rx="6" fill="#B0603E"/>
    <path d="M336,332 h88 l-8,20 h-72 z" fill="#1B2233"/>
    <rect x="376" y="296" width="8" height="24" fill="#131826"/>
    <path d="M384,296 h34 v10 h-34 z" fill="#C9A227"/>
  </g>
  <!-- moored dhow, right foreground -->
  <g>
    <path d="M560,430 q90,34 210,0 l-24,28 h-166 z" fill="#1B2233"/>
    <path d="M648,430 v-160" stroke="#131826" stroke-width="9"/>
    <path d="M652,272 C724,300 736,376 700,426 L652,426 Z" fill="#E8DCC8"/>
    <path d="M652,272 C724,300 736,376 700,426" fill="none" stroke="#C9A227" stroke-width="3"/>
  </g>
  <!-- railing and promenade, near edge -->
  <rect y="440" width="800" height="60" fill="#0E1220"/>
  <g stroke="#C9A227" stroke-width="4">
    <line x1="0" y1="446" x2="800" y2="446"/>
    <line x1="60" y1="446" x2="60" y2="486"/><line x1="200" y1="446" x2="200" y2="486"/>
    <line x1="340" y1="446" x2="340" y2="486"/><line x1="480" y1="446" x2="480" y2="486"/>
    <line x1="620" y1="446" x2="620" y2="486"/><line x1="760" y1="446" x2="760" y2="486"/>
  </g>
  <!-- mooring post with rope -->
  <rect x="108" y="398" width="16" height="46" rx="4" fill="#B0603E"/>
  <path d="M116,404 c40,10 60,24 66,44" stroke="#E8DCC8" stroke-width="3.4" fill="none"/>
  <!-- gulls -->
  <g stroke="#E8DCC8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M180,160 q10,-10 20,0 q10,-10 20,0"/>
    <path d="M260,190 q8,-8 16,0 q8,-8 16,0"/>
    <path d="M700,170 q8,-8 16,0 q8,-8 16,0"/>
  </g>
</svg>
