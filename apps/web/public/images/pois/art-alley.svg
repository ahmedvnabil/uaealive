<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="aaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="aaCoral" width="18" height="14" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#0B0E14" opacity=".08"/>
      <circle cx="14" cy="11" r="0.8" fill="#0B0E14" opacity=".06"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#aaSky)"/>
  <g fill="#E8DCC8">
    <circle cx="380" cy="50" r="1.6" opacity=".7"/><circle cx="430" cy="90" r="1.2" opacity=".5"/>
    <circle cx="360" cy="120" r="1.3" opacity=".55"/><circle cx="450" cy="40" r="1.8" opacity=".75"/>
  </g>
  <!-- one-point perspective alley: left wall -->
  <path d="M0,60 L340,180 L340,420 L0,500 Z" fill="#E8DCC8"/>
  <path d="M0,60 L340,180 L340,420 L0,500 Z" fill="url(#aaCoral)"/>
  <!-- right wall -->
  <path d="M800,60 L460,180 L460,420 L800,500 Z" fill="#D8C9AC"/>
  <path d="M800,60 L460,180 L460,420 L800,500 Z" fill="url(#aaCoral)"/>
  <!-- alley end wall with lit doorway -->
  <rect x="340" y="180" width="120" height="240" fill="#C9B792"/>
  <path d="M372,420 v-52 a28,30 0 0 1 56,0 v52 z" fill="#E6C15A"/>
  <path d="M372,420 v-52 a28,30 0 0 1 56,0 v52 z" fill="none" stroke="#B0603E" stroke-width="4"/>
  <!-- alley floor converging -->
  <path d="M0,500 L340,420 H460 L800,500 Z" fill="#0E1220"/>
  <path d="M310,440 L400,420 L490,440 L400,464 Z" fill="#E6C15A" opacity=".12"/>
  <!-- murals on left wall (perspective-skewed) -->
  <g transform="translate(40,150) skewY(20)">
    <rect width="150" height="120" fill="#131826"/>
    <circle cx="75" cy="60" r="38" fill="#2E6E5E"/>
    <circle cx="75" cy="60" r="20" fill="#E6C15A"/>
    <path d="M20,104 h110" stroke="#B0603E" stroke-width="8"/>
  </g>
  <g transform="translate(216,208) skewY(20)">
    <rect width="90" height="90" fill="#B0603E"/>
    <path d="M12,70 c20,-44 46,-44 66,-58" stroke="#E8DCC8" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="66" cy="66" r="9" fill="#E6C15A"/>
  </g>
  <!-- murals on right wall -->
  <g transform="translate(760,124) skewY(-20) scale(-1,1)">
    <rect width="180" height="130" fill="#131826"/>
    <path d="M16,110 l38,-64 l30,34 l26,-46 l54,76 z" fill="#2E6E5E"/>
    <circle cx="140" cy="34" r="16" fill="#E6C15A"/>
  </g>
  <g transform="translate(560,260) skewY(-20) scale(-1,1)">
    <rect width="70" height="80" fill="#E6C15A"/>
    <path d="M12,64 q23,-48 46,0" stroke="#131826" stroke-width="6" fill="none"/>
    <circle cx="35" cy="24" r="8" fill="#B0603E"/>
  </g>
  <!-- paint tins by wall -->
  <g>
    <rect x="300" y="432" width="22" height="26" rx="2" fill="#1B2233"/>
    <ellipse cx="311" cy="432" rx="11" ry="4" fill="#2E6E5E"/>
    <rect x="478" y="436" width="20" height="24" rx="2" fill="#1B2233"/>
    <ellipse cx="488" cy="436" rx="10" ry="4" fill="#B0603E"/>
  </g>
  <!-- string of festival pennants across the alley -->
  <path d="M60,120 C260,190 540,190 740,120" stroke="#E8DCC8" stroke-width="3" fill="none" opacity=".8"/>
  <g>
    <path d="M150,152 l12,26 l14,-20 z" fill="#E6C15A"/>
    <path d="M260,176 l11,25 l14,-19 z" fill="#2E6E5E"/>
    <path d="M380,186 l11,25 l14,-19 z" fill="#B0603E"/>
    <path d="M500,180 l11,25 l14,-19 z" fill="#E8DCC8"/>
    <path d="M620,158 l11,24 l14,-18 z" fill="#C9A227"/>
  </g>
</svg>
