<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="mqSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="mqCoral" width="18" height="14" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#0B0E14" opacity=".08"/>
      <circle cx="14" cy="11" r="0.8" fill="#0B0E14" opacity=".06"/>
    </pattern>
    <radialGradient id="mqWindow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#E6C15A" stop-opacity=".5"/>
      <stop offset="1" stop-color="#E6C15A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mqSky)"/>
  <!-- generous star field -->
  <g fill="#E8DCC8">
    <circle cx="80" cy="60" r="2" opacity=".85"/><circle cx="170" cy="120" r="1.3" opacity=".6"/>
    <circle cx="260" cy="50" r="1.7" opacity=".75"/><circle cx="350" cy="100" r="1.2" opacity=".5"/>
    <circle cx="470" cy="40" r="1.9" opacity=".8"/><circle cx="560" cy="110" r="1.3" opacity=".55"/>
    <circle cx="660" cy="60" r="1.6" opacity=".7"/><circle cx="740" cy="140" r="1.3" opacity=".55"/>
    <circle cx="120" cy="190" r="1.2" opacity=".45"/><circle cx="620" cy="180" r="1.2" opacity=".45"/>
    <circle cx="410" cy="160" r="1.4" opacity=".55"/><circle cx="720" cy="230" r="1.1" opacity=".4"/>
  </g>
  <g fill="#E6C15A"><circle cx="300" cy="140" r="1.6" opacity=".7"/><circle cx="520" cy="200" r="1.5" opacity=".6"/></g>
  <!-- slender minaret -->
  <g fill="#E8DCC8">
    <path d="M576,440 l6,-240 h44 l6,240 z"/>
    <path d="M568,200 h72 l-8,-14 h-56 z"/>
    <path d="M586,186 h36 v-40 h-36 z"/>
    <path d="M582,146 h44 l-6,-10 h-32 z"/>
    <path d="M596,136 a12,16 0 0 1 16,0 v-16 a8,10 0 0 0 -16,0 z"/>
  </g>
  <path d="M604,104 a10,10 0 1 0 7,17 a8,8 0 1 1 -7,-17 z" fill="#E6C15A"/>
  <g fill="#131826">
    <rect x="596" y="220" width="16" height="30" rx="8"/>
    <rect x="596" y="290" width="16" height="30" rx="8"/>
    <rect x="596" y="360" width="16" height="30" rx="8"/>
  </g>
  <path d="M586,166 h36" stroke="#C9A227" stroke-width="4"/>
  <!-- prayer hall with dome -->
  <rect x="150" y="290" width="380" height="150" fill="#E8DCC8"/>
  <rect x="150" y="290" width="380" height="150" fill="url(#mqCoral)"/>
  <!-- dome on drum -->
  <rect x="270" y="266" width="140" height="26" fill="#E8DCC8"/>
  <path d="M270,266 a70,64 0 0 1 140,0 z" fill="#D8C9AC"/>
  <path d="M270,266 a70,64 0 0 1 140,0" fill="none" stroke="#C9A227" stroke-width="4"/>
  <rect x="337" y="190" width="6" height="12" fill="#E6C15A"/>
  <path d="M340,164 a12,12 0 1 0 9,20 a9,9 0 1 1 -9,-20 z" fill="#E6C15A"/>
  <!-- arched windows glowing softly -->
  <g>
    <ellipse cx="230" cy="380" rx="46" ry="40" fill="url(#mqWindow)"/>
    <ellipse cx="340" cy="380" rx="46" ry="40" fill="url(#mqWindow)"/>
    <ellipse cx="450" cy="380" rx="46" ry="40" fill="url(#mqWindow)"/>
    <g fill="#C9A227">
      <path d="M214,404 v-24 a16,18 0 0 1 32,0 v24 z"/>
      <path d="M324,404 v-24 a16,18 0 0 1 32,0 v24 z"/>
      <path d="M434,404 v-24 a16,18 0 0 1 32,0 v24 z"/>
    </g>
    <g stroke="#131826" stroke-width="2.4" opacity=".5">
      <path d="M230,382 v22 M214,392 h32"/>
      <path d="M340,382 v22 M324,392 h32"/>
      <path d="M450,382 v22 M434,392 h32"/>
    </g>
  </g>
  <!-- crenellated roofline -->
  <g fill="#D8C9AC">
    <rect x="156" y="278" width="18" height="14"/><rect x="192" y="278" width="18" height="14"/>
    <rect x="228" y="278" width="18" height="14"/><rect x="434" y="278" width="18" height="14"/>
    <rect x="470" y="278" width="18" height="14"/><rect x="506" y="278" width="18" height="14"/>
  </g>
  <!-- neighbouring house silhouettes -->
  <rect x="40" y="340" width="110" height="100" fill="#1B2233"/>
  <rect x="660" y="330" width="120" height="110" fill="#1B2233"/>
  <rect y="440" width="800" height="60" fill="#0E1220"/>
  <path d="M150,440 h380 l40,40 h-460 z" fill="#E6C15A" opacity=".1"/>
</svg>
