<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img">
  <defs>
    <linearGradient id="dfSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <pattern id="dfCoral" width="14" height="10" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#0B0E14" opacity=".12"/>
      <circle cx="10" cy="7" r="1" fill="#0B0E14" opacity=".09"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#dfSky)"/>
  <g fill="#E8DCC8">
    <circle cx="90" cy="60" r="2" opacity=".85"/><circle cx="240" cy="40" r="1.4" opacity=".6"/>
    <circle cx="420" cy="70" r="1.7" opacity=".7"/><circle cx="600" cy="40" r="1.3" opacity=".55"/>
    <circle cx="720" cy="90" r="1.9" opacity=".8"/><circle cx="160" cy="140" r="1.2" opacity=".5"/>
    <circle cx="530" cy="120" r="1.2" opacity=".5"/>
  </g>
  <path d="M120,90 a42,42 0 1 0 29,72 a33,33 0 1 1 -29,-72 z" fill="#E6C15A" opacity=".9"/>
  <!-- massive round watchtower, left -->
  <g>
    <path d="M170,440 c-14,-120 -10,-200 10,-260 h120 c20,60 24,140 10,260 z" fill="#E8DCC8"/>
    <path d="M170,440 c-14,-120 -10,-200 10,-260 h120 c20,60 24,140 10,260 z" fill="url(#dfCoral)"/>
    <!-- crenellations -->
    <g fill="#E8DCC8">
      <rect x="164" y="156" width="24" height="28"/>
      <rect x="204" y="150" width="24" height="34"/>
      <rect x="244" y="148" width="24" height="36"/>
      <rect x="284" y="150" width="24" height="34"/>
    </g>
    <path d="M172,184 h136" stroke="#D8C9AC" stroke-width="8"/>
    <!-- gun slits -->
    <g fill="#131826">
      <rect x="200" y="230" width="12" height="34" rx="6"/>
      <rect x="244" y="222" width="12" height="34" rx="6"/>
      <rect x="288" y="230" width="12" height="34" rx="6"/>
      <rect x="222" y="320" width="12" height="34" rx="6"/>
      <rect x="266" y="320" width="12" height="34" rx="6"/>
    </g>
    <!-- chandal beam ends -->
    <g fill="#8C6239">
      <ellipse cx="192" cy="290" rx="9" ry="6"/><ellipse cx="240" cy="288" rx="9" ry="6"/>
      <ellipse cx="288" cy="290" rx="9" ry="6"/>
    </g>
  </g>
  <!-- fort curtain wall, right -->
  <rect x="300" y="280" width="440" height="160" fill="#E8DCC8"/>
  <rect x="300" y="280" width="440" height="160" fill="url(#dfCoral)"/>
  <!-- wall crenellations -->
  <g fill="#E8DCC8">
    <rect x="330" y="258" width="26" height="24"/><rect x="390" y="258" width="26" height="24"/>
    <rect x="450" y="258" width="26" height="24"/><rect x="510" y="258" width="26" height="24"/>
    <rect x="570" y="258" width="26" height="24"/><rect x="630" y="258" width="26" height="24"/>
    <rect x="690" y="258" width="26" height="24"/>
  </g>
  <!-- great gate with heavy teak doors -->
  <path d="M440,440 v-100 a60,64 0 0 1 120,0 v100 z" fill="#B0603E"/>
  <path d="M500,340 v100" stroke="#0B0E14" stroke-width="3" opacity=".5"/>
  <g fill="#E6C15A">
    <circle cx="474" cy="366" r="3"/><circle cx="526" cy="366" r="3"/>
    <circle cx="474" cy="392" r="3"/><circle cx="526" cy="392" r="3"/>
    <circle cx="474" cy="418" r="3"/><circle cx="526" cy="418" r="3"/>
  </g>
  <path d="M440,440 v-100 a60,64 0 0 1 120,0 v100" fill="none" stroke="#C9A227" stroke-width="5"/>
  <!-- flag above gate -->
  <line x1="500" y1="258" x2="500" y2="180" stroke="#D8C9AC" stroke-width="5"/>
  <path d="M500,182 l64,14 l-64,14 z" fill="#B0603E"/>
  <!-- bronze cannon by the gate -->
  <g>
    <path d="M600,428 l70,-24 c8,-3 14,2 12,10 l-4,10 l-74,16 z" fill="#C9A227"/>
    <circle cx="620" cy="436" r="14" fill="#131826" stroke="#C9A227" stroke-width="4"/>
  </g>
  <!-- dhow displayed in forecourt (museum piece) -->
  <g>
    <path d="M60,470 q50,18 120,0 l-14,16 h-92 z" fill="#1B2233"/>
    <path d="M112,470 v-52" stroke="#131826" stroke-width="5"/>
    <path d="M114,420 c26,10 32,34 20,50 l-20,0 z" fill="#D8C9AC"/>
  </g>
  <rect y="470" width="800" height="30" fill="#0E1220"/>
  <path d="M440,440 h120 l30,30 h-180 z" fill="#E6C15A" opacity=".1"/>
</svg>
