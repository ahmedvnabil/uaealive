<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="pdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <clipPath id="pdClip"><circle cx="200" cy="200" r="172"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="172" fill="url(#pdBg)"/>
  <g clip-path="url(#pdClip)">
    <!-- stars -->
    <g fill="#E8DCC8">
      <circle cx="110" cy="80" r="1.8" opacity=".7"/><circle cx="290" cy="70" r="1.4" opacity=".55"/>
      <circle cx="330" cy="140" r="1.2" opacity=".45"/><circle cx="70" cy="150" r="1.2" opacity=".45"/>
    </g>
    <!-- sea waves behind the bust -->
    <g fill="none" stroke="#2E6E5E" stroke-width="5" opacity=".7">
      <path d="M10,260 q30,-18 60,0 t60,0 t60,0 t60,0 t60,0 t60,0"/>
      <path d="M-20,290 q30,-18 60,0 t60,0 t60,0 t60,0 t60,0 t60,0 t60,0"/>
    </g>
    <!-- shoulders: simple diver's garment -->
    <path d="M80,400 c0-70 52-104 120-104 c68,0 120,34 120,104 z" fill="#D8C9AC"/>
    <path d="M148,314 c34,18 70,18 104,0 l-10,52 h-84 z" fill="#B98F63" opacity=".5"/>
    <!-- neck -->
    <rect x="178" y="252" width="44" height="52" fill="#C9996B"/>
    <!-- head -->
    <ellipse cx="200" cy="200" rx="62" ry="70" fill="#C9996B"/>
    <!-- fitam nose clip: single minimal accent -->
    <path d="M193,214 h14" stroke="#E6C15A" stroke-width="6" stroke-linecap="round"/>
    <!-- cloth headband -->
    <path d="M136,178 a64,54 0 0 1 128,0 l0,14 a64,58 0 0 0 -128,0 z" fill="#E8DCC8"/>
    <path d="M262,182 c16,4 24,14 24,26 c-10,-6 -18,-8 -26,-8 z" fill="#E8DCC8"/>
    <!-- open oyster with pearl at chest -->
    <g transform="translate(200,364)">
      <path d="M-34,0 a34,18 0 0 1 68,0 z" fill="#B0603E"/>
      <path d="M-34,0 a34,20 0 0 0 68,0 z" fill="#D8C9AC"/>
      <circle cx="0" cy="-6" r="12" fill="#E8DCC8"/>
      <circle cx="-4" cy="-9" r="4" fill="#FFFFFF" opacity=".8"/>
    </g>
    <!-- descending rope with stone weight, side motif -->
    <path d="M318,120 v130" stroke="#C9A227" stroke-width="4" stroke-dasharray="12 8"/>
    <path d="M304,250 h28 l-6,26 h-16 z" fill="#C9A227"/>
  </g>
  <!-- frame -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#C9A227" stroke-width="6"/>
  <circle cx="200" cy="200" r="184" fill="none" stroke="#C9A227" stroke-width="2" opacity=".5"/>
  <g fill="#E6C15A">
    <circle cx="200" cy="16" r="4"/><circle cx="200" cy="384" r="4"/>
    <circle cx="16" cy="200" r="4"/><circle cx="384" cy="200" r="4"/>
  </g>
</svg>
