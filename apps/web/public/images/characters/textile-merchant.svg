    <path d="M138,164 a64,42 0 0 1 124,0" fill="none" stroke="#131826" stroke-width="11"/>
    <path d="M140,178 a62,40 0 0 1 120,0" fill="none" stroke="#131826" stroke-width="8"/>
    <!-- folded textile bolts across the base -->
    <g transform="translate(0,332)">
      <rect x="52" y="0" width="296" height="22" rx="6" fill="#B0603E"/>
      <rect x="52" y="22" width="296" height="22" rx="6" fill="#2E6E5E"/>
      <rect x="52" y="44" width="296" height="22" rx="6" fill="#C9A227"/>
