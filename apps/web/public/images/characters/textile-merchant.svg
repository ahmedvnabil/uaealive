        <line x1="120" y1="0" x2="120" y2="66"/><line x1="200" y1="0" x2="200" y2="66"/>
        <line x1="280" y1="0" x2="280" y2="66"/>
      </g>
      <path d="M52,0 q-14,22 0,44 q-12,12 0,22" fill="none" stroke="#E8DCC8" stroke-width="3" opacity=".6"/>
    </g>
