<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="tmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <clipPath id="tmClip"><circle cx="200" cy="200" r="172"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="172" fill="url(#tmBg)"/>
  <g clip-path="url(#tmClip)">
    <g fill="#E8DCC8">
      <circle cx="100" cy="90" r="1.6" opacity=".65"/><circle cx="310" cy="80" r="1.4" opacity=".55"/>
      <circle cx="330" cy="150" r="1.2" opacity=".45"/>
    </g>
    <!-- souq arch hint behind -->
    <path d="M60,400 v-180 a140,150 0 0 1 280,0 v180" fill="none" stroke="#C9A227" stroke-width="4" opacity=".35"/>
    <!-- kandura shoulders -->
    <path d="M74,400 c0-72 54-108 126-108 c72,0 126,36 126,108 z" fill="#E8DCC8"/>
    <path d="M200,296 l-16,40 h32 z" fill="#D8C9AC"/>
    <!-- neck -->
    <rect x="180" y="248" width="40" height="50" fill="#C9996B"/>
    <!-- head -->
    <ellipse cx="200" cy="196" rx="58" ry="66" fill="#C9996B"/>
    <!-- short beard suggestion -->
    <path d="M156,222 a58,52 0 0 0 88,0 c-6,32 -22,46 -44,46 c-22,0 -38,-14 -44,-46 z" fill="#4A3A2C"/>
    <!-- ghutra draped over head and shoulders -->
    <path d="M134,190 a66,66 0 0 1 132,0 v10 a66,60 0 0 0 -132,0 z" fill="#E8DCC8"/>
    <path d="M138,196 c-14,34 -18,72 -10,104 l-34,0 c-6,-46 8,-86 44,-104 z" fill="#E8DCC8"/>
    <path d="M262,196 c14,34 18,72 10,104 l34,0 c6,-46 -8,-86 -44,-104 z" fill="#E8DCC8"/>
