<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="mbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#131826"/>
    </linearGradient>
    <clipPath id="mbClip"><circle cx="200" cy="200" r="172"/></clipPath>
  </defs>
  <circle cx="200" cy="200" r="172" fill="url(#mbBg)"/>
  <g clip-path="url(#mbClip)">
    <g fill="#E8DCC8">
      <circle cx="90" cy="100" r="1.6" opacity=".65"/><circle cx="316" cy="90" r="1.4" opacity=".55"/>
    </g>
    <!-- barjeel silhouette he built, behind his shoulder -->
    <g fill="#1E2638">
      <rect x="270" y="100" width="76" height="130"/>
      <rect x="262" y="94" width="12" height="16"/><rect x="342" y="94" width="12" height="16"/>
      <rect x="302" y="84" width="12" height="18"/>
    </g>
    <g fill="#0B0E14">
      <rect x="280" y="112" width="12" height="40"/><rect x="297" y="112" width="12" height="40"/>
      <rect x="314" y="112" width="12" height="40"/><rect x="331" y="112" width="12" height="40"/>
    </g>
    <path d="M280,132 h74" stroke="#1E2638" stroke-width="0"/>
    <path d="M280,132 h63" stroke="#C9A227" stroke-width="3" opacity=".6"/>
    <!-- work robe shoulders -->
    <path d="M76,400 c0-70 54-106 124-106 c70,0 124,36 124,106 z" fill="#B0603E"/>
    <path d="M148,314 c34,16 70,16 104,0 l-8,44 h-88 z" fill="#8C4C31"/>
    <!-- shoulder cloth -->
    <path d="M96,400 c-2,-52 18,-84 52,-98 l14,22 c-28,16 -42,42 -44,76 z" fill="#E8DCC8"/>
    <!-- neck -->
    <rect x="178" y="250" width="44" height="50" fill="#B98455"/>
    <!-- head -->
    <ellipse cx="200" cy="198" rx="60" ry="68" fill="#B98455"/>
    <!-- full beard -->
    <path d="M152,220 a60,54 0 0 0 96,0 c-4,38 -22,56 -48,56 c-26,0 -44,-18 -48,-56 z" fill="#DDD3C0"/>
    <!-- wrapped turban cap -->
    <path d="M134,182 a66,58 0 0 1 132,0 l-4,10 a64,50 0 0 0 -124,0 z" fill="#E8DCC8"/>
    <path d="M138,168 a64,44 0 0 1 124,0" fill="none" stroke="#D8C9AC" stroke-width="9"/>
    <path d="M144,154 a60,36 0 0 1 112,0" fill="none" stroke="#E8DCC8" stroke-width="9"/>
    <!-- hand tools crossed at the base: trowel and plumb line -->
    <g transform="translate(200,352)">
      <path d="M-92,26 l64,-40 l14,10 l-60,44 z" fill="#C9A227"/>
      <rect x="-30" y="-22" width="34" height="12" rx="5" transform="rotate(-32)" fill="#8C4C31"/>
      <path d="M52,-18 v40" stroke="#E8DCC8" stroke-width="3.4"/>
      <path d="M44,22 h16 l-8,16 z" fill="#E6C15A"/>
      <circle cx="52" cy="-22" r="6" fill="#E8DCC8"/>
    </g>
    <!-- gypsum carving arcs, decorative corner -->
    <g fill="none" stroke="#C9A227" stroke-width="3" opacity=".5">
      <circle cx="66" cy="120" r="22"/><circle cx="66" cy="120" r="11"/>
    </g>
  </g>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#C9A227" stroke-width="6"/>
  <circle cx="200" cy="200" r="184" fill="none" stroke="#C9A227" stroke-width="2" opacity=".5"/>
  <g fill="#E6C15A">
    <circle cx="200" cy="16" r="4"/><circle cx="200" cy="384" r="4"/>
    <circle cx="16" cy="200" r="4"/><circle cx="384" cy="200" r="4"/>
  </g>
</svg>
